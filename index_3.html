<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LifeOS</title>
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--white:#fff;--ink:#1a1a1a;--ink2:#3d3d3d;
  --muted:#888;--muted2:#bbb;--border:#e8e5e0;--border2:#d4d0c8;
  --accent:#7c3aed;--accent-light:rgba(124,58,237,0.07);
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
}
html,body{height:100%;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ── AUTH ── */
#auth-screen{flex-direction:column;align-items:center;justify-content:center;background:var(--ink);padding:2rem}
.auth-logo{font-size:2rem;font-weight:800;letter-spacing:-0.03em;color:#fff;margin-bottom:0.25rem}
.auth-logo span{color:#a78bfa}
.auth-tagline{font-family:Georgia,serif;font-style:italic;font-size:0.82rem;color:rgba(255,255,255,0.3);margin-bottom:2.5rem;text-align:center;line-height:1.6}
.auth-box{background:var(--white);border-radius:var(--r-lg);padding:2rem;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
.auth-box h2{font-size:1rem;font-weight:700;margin-bottom:0.2rem}
.auth-box p{font-family:Georgia,serif;font-style:italic;font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.5}
.auth-input{width:100%;border:1.5px solid var(--border2);border-radius:var(--r-md);padding:0.65rem 0.9rem;font-size:0.9rem;color:var(--ink);background:var(--bg);outline:none;transition:border-color 0.15s;font-family:'Segoe UI',sans-serif;display:block;margin-bottom:0.75rem}
.auth-input:focus{border-color:var(--accent);background:var(--white)}
.auth-btn{width:100%;padding:0.65rem;background:var(--ink);color:#fff;border:none;border-radius:var(--r-md);font-size:0.88rem;font-weight:700;cursor:pointer;transition:background 0.15s;font-family:'Segoe UI',sans-serif}
.auth-btn:hover{background:#2d2d2d}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-notice{margin-top:0.85rem;padding:0.65rem 0.9rem;border-radius:var(--r-md);font-size:0.78rem;font-family:Georgia,serif;font-style:italic;text-align:center;display:none}
.auth-notice.ok{background:#d1fae5;color:#065f46;display:block}
.auth-notice.err{background:#fee2e2;color:#991b1b;display:block}

/* ── APP ── */
#app-screen{flex-direction:column}
.topbar{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:var(--ink);color:#fff;flex-shrink:0}
.topbar-brand{font-size:0.95rem;font-weight:800;letter-spacing:-0.02em;flex:1}
.topbar-brand span{color:#a78bfa}
.topbar-email{font-size:0.65rem;color:rgba(255,255,255,0.3);font-family:Georgia,serif;font-style:italic;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.signout-btn{padding:0.25rem 0.65rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r-sm);font-size:0.65rem;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.15s;font-family:'Segoe UI',sans-serif}
.signout-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.status-bar{padding:0.35rem 1.25rem;font-size:0.65rem;font-family:Georgia,serif;font-style:italic;flex-shrink:0;display:none}
.status-bar.show{display:block}
.status-bar.syncing{background:#fffbeb;color:#92400e}
.status-bar.saved{background:#f0fdf4;color:#065f46}
.status-bar.error{background:#fef2f2;color:#991b1b}
.capture-area{padding:1.25rem 1.25rem 0.75rem;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.capture-wrap{position:relative}
.capture-input{width:100%;border:2px solid var(--border);border-radius:var(--r-lg);padding:0.85rem 1.1rem;font-size:1rem;color:var(--ink);background:var(--bg);outline:none;resize:none;min-height:52px;line-height:1.5;transition:border-color 0.15s,box-shadow 0.15s;font-family:'Segoe UI',sans-serif}
.capture-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.08)}
.capture-input::placeholder{color:var(--muted2);font-style:italic}
.capture-hint{font-size:0.62rem;color:var(--muted2);margin-top:0.4rem;font-family:Georgia,serif;font-style:italic;text-align:right}
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1.5px solid var(--border2);border-radius:var(--r-md);box-shadow:0 8px 24px rgba(0,0,0,0.08);z-index:100;min-width:200px;max-width:280px;overflow:hidden;display:none}
.ac-drop.open{display:block}
.ac-row{display:flex;align-items:center;gap:0.6rem;padding:0.48rem 0.75rem;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.ac-row:last-child{border-bottom:none}
.ac-row:hover,.ac-row.hi{background:var(--accent-light)}
.ac-tag{font-family:'Cascadia Code',monospace;font-size:0.7rem;font-weight:600;color:var(--ink2);border:1.5px solid var(--border2);border-radius:99px;padding:0.1rem 0.5rem;flex-shrink:0}
.ac-row.hi .ac-tag{border-color:var(--accent);color:var(--accent)}
.ac-desc{font-size:0.7rem;color:var(--muted);font-family:Georgia,serif;font-style:italic;flex:1}
.ac-tab{font-family:'Cascadia Code',monospace;font-size:0.56rem;color:var(--muted2);background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:0.06rem 0.28rem;flex-shrink:0}
.ac-row.hi .ac-tab{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}
.inbox-area{flex:1;padding:1rem 1.25rem 2rem;overflow-y:auto}
.inbox-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.inbox-lbl{font-family:'Cascadia Code',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted2)}
.inbox-cnt{font-family:'Cascadia Code',monospace;font-size:0.62rem;color:var(--muted2);background:var(--white);border:1px solid var(--border);border-radius:99px;padding:0.1rem 0.5rem}
.inbox-empty{text-align:center;padding:3rem 1rem;color:var(--muted2);font-family:Georgia,serif;font-style:italic;font-size:0.88rem;line-height:1.7}
.t-item{display:flex;align-items:flex-start;gap:0.65rem;padding:0.55rem 0;border-bottom:1px solid var(--border);animation:si 0.2s ease both}
@keyframes si{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.t-item:last-child{border-bottom:none}
.t-num{font-family:'Cascadia Code',monospace;font-size:0.62rem;color:var(--muted2);min-width:1.4rem;text-align:right;padding-top:0.18rem;flex-shrink:0}
.t-text{flex:1;font-size:0.88rem;line-height:1.5;color:var(--ink2)}
.t-actions{display:flex;gap:0.25rem;opacity:0;transition:opacity 0.15s;flex-shrink:0}
.t-item:hover .t-actions{opacity:1}
.t-btn{padding:0.18rem 0.5rem;border-radius:var(--r-sm);font-size:0.65rem;font-weight:600;font-family:'Segoe UI',sans-serif;cursor:pointer;transition:all 0.12s;border:1.5px solid transparent;background:none;white-space:nowrap}
.t-btn.arch{color:#92400e;border-color:#fde68a;background:#fffbeb}
.t-btn.arch:hover{background:#fef3c7;border-color:#d97706}
.t-btn.del{color:#6b7280;border-color:#e5e7eb;background:#f9fafb}
.t-btn.del:hover{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.t-item.is-one{background:var(--white);border:1.5px solid var(--ink);border-radius:var(--r-md);padding:0.5rem 0.75rem;margin-bottom:0.4rem}
.t-item.is-one .t-text{font-weight:700;color:var(--ink)}
.tt{display:inline-flex;align-items:center;font-size:0.67rem;padding:0.12rem 0.48rem;border-radius:99px;margin-left:0.25rem;vertical-align:middle;font-weight:600}
.tt-action{color:#065f46;background:#d1fae5}
.tt-project{color:#4c1d95;background:#ede9fe}
.tt-someday{color:#92400e;background:#fef3c7}
.tt-reference{color:#1e3a8a;background:#dbeafe}
.tt-waiting{color:#831843;background:#fce7f3}
.tt-one{color:#fff;background:var(--ink)}
.tt-next{color:#4c1d95;background:#ede9fe}
.tt-now{color:#fff;background:#ef4444}
.tt-high{color:#9a3412;background:#fed7aa}
.tt-medium{color:#92400e;background:#fef3c7}
.tt-low{color:#374151;background:#f3f4f6}
.tt-book{color:#065f46;background:#d1fae5}
.tt-backlog{color:#4c1d95;background:#ede9fe}
.tt-default{color:#374151;background:#f3f4f6}
</style>
</head>
<body>

<!-- AUTH SCREEN — visible by default -->
<div id="auth-screen" class="screen active">
  <div class="auth-logo">Life<span>OS</span></div>
  <div class="auth-tagline">Your mind is for having ideas,<br>not holding them.</div>
  <div class="auth-box">
    <h2>Sign in</h2>
    <p>Enter your email — we'll send you a magic link. No password needed.</p>
    <input type="email" id="auth-email" class="auth-input" placeholder="your@email.com">
    <button id="auth-btn" class="auth-btn">Send magic link →</button>
    <div id="auth-notice" class="auth-notice"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="topbar-brand">Life<span>OS</span></div>
    <div class="topbar-email" id="user-email"></div>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>
  <div class="status-bar" id="status-bar"></div>
  <div class="capture-area">
    <div class="capture-wrap">
      <textarea id="capture-input" class="capture-input" rows="1" placeholder="What's on your mind… (type # for tags)"></textarea>
      <div id="ac-drop" class="ac-drop"></div>
    </div>
    <div class="capture-hint">Enter to capture · Tab to complete tag</div>
  </div>
  <div class="inbox-area">
    <div class="inbox-meta">
      <span class="inbox-lbl">Inbox</span>
      <span class="inbox-cnt" id="inbox-cnt">—</span>
    </div>
    <div id="inbox-list"><div class="inbox-empty">Loading…</div></div>
  </div>
</div>

<script>
// ── SUPABASE INIT ─────────────────────────────────────────────────────────
const sb = supabase.createClient(
  'https://gjtosnepnxtdwehvdpie.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqdG9zbmVwbnh0ZHdlaHZkcGllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjMyMDcsImV4cCI6MjA5MTA5OTIwN30.7djS-wM0MiEJbUpEE0AE9FPpj8rf72Mo_JMgo0zoTq0'
);

// ── STATE ─────────────────────────────────────────────────────────────────
let user = null;
let items = [];

// ── SCREENS ───────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── STATUS BAR ────────────────────────────────────────────────────────────
let statusTimer = null;
function setStatus(msg, type, autohide){
  clearTimeout(statusTimer);
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'status-bar show ' + type;
  if(autohide) statusTimer = setTimeout(() => bar.classList.remove('show'), autohide);
}

// ── AUTH FUNCTIONS ────────────────────────────────────────────────────────
async function signIn(){
  const email = document.getElementById('auth-email').value.trim();
  if(!email){ showNotice('Please enter your email.', 'err'); return; }
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: location.origin + location.pathname }
    });
    if(error) throw error;
    showNotice('✓ Check your email — magic link sent!', 'ok');
    btn.textContent = 'Link sent ✓';
  } catch(e) {
    showNotice(e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Send magic link →';
  }
}

async function signOut(){
  await sb.auth.signOut();
}

function showNotice(msg, type){
  const el = document.getElementById('auth-notice');
  el.textContent = msg;
  el.className = 'auth-notice ' + type;
}

// ── INBOX FUNCTIONS ───────────────────────────────────────────────────────
async function loadInbox(){
  document.getElementById('inbox-list').innerHTML = '<div class="inbox-empty">Loading…</div>';
  try {
    const { data, error } = await sb
      .from('inbox')
      .select('*')
      .eq('user_id', user.id)
      .is('archived_at', null)
      .order('created_at', { ascending: false });
    if(error) throw error;
    items = data || [];
    renderInbox();
  } catch(e) {
    setStatus('Failed to load inbox: ' + e.message, 'error');
    document.getElementById('inbox-list').innerHTML = '<div class="inbox-empty">Failed to load. Please refresh.</div>';
  }
}

async function saveCapture(text){
  setStatus('Saving…', 'syncing');
  try {
    const { data, error } = await sb
      .from('inbox')
      .insert({ user_id: user.id, text, tags: getTags(text).join(',') })
      .select()
      .single();
    if(error) throw error;
    items.unshift(data);
    renderInbox();
    setStatus('✓ Saved', 'saved', 2000);
  } catch(e) {
    setStatus('Failed to save: ' + e.message, 'error');
  }
}

async function archiveItem(id){
  items = items.filter(t => t.id !== id);
  renderInbox();
  await sb.from('inbox').update({ archived_at: new Date().toISOString() }).eq('id', id).eq('user_id', user.id);
}

async function deleteItem(id){
  items = items.filter(t => t.id !== id);
  renderInbox();
  await sb.from('inbox').delete().eq('id', id).eq('user_id', user.id);
}

// ── RENDER ────────────────────────────────────────────────────────────────
const TAG_MAP = {
  action:'tt-action',project:'tt-project',someday:'tt-someday',
  reference:'tt-reference',waiting:'tt-waiting',one:'tt-one',
  next:'tt-next',now:'tt-now',high:'tt-high',medium:'tt-medium',
  low:'tt-low',book:'tt-book',backlog:'tt-backlog',
};

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function renderText(text){
  return esc(text).replace(/#(\w+)/g, (m,t) =>
    `<span class="tt ${TAG_MAP[t.toLowerCase()]||'tt-default'}">${m}</span>`
  );
}

function getTags(text){
  return (text.match(/#\w+/g)||[]).map(t => t.slice(1).toLowerCase());
}

function renderInbox(){
  const list = document.getElementById('inbox-list');
  const cnt = document.getElementById('inbox-cnt');
  cnt.textContent = items.length + ' item' + (items.length!==1?'s':'');
  if(!items.length){
    list.innerHTML = '<div class="inbox-empty">Nothing here yet.<br>Type above and press Enter to capture.</div>';
    return;
  }
  list.innerHTML = items.map((t, i) => {
    const one = getTags(t.text).includes('one');
    return `<div class="t-item${one?' is-one':''}">
      <span class="t-num">${i+1}</span>
      <span class="t-text">${renderText(t.text)}</span>
      <div class="t-actions">
        <button class="t-btn arch" data-id="${t.id}">archive</button>
        <button class="t-btn del" data-id="${t.id}">✕</button>
      </div>
    </div>`;
  }).join('');

  // attach events after render to avoid inline onclick issues
  list.querySelectorAll('.t-btn.arch').forEach(btn =>
    btn.addEventListener('click', () => archiveItem(+btn.dataset.id))
  );
  list.querySelectorAll('.t-btn.del').forEach(btn =>
    btn.addEventListener('click', () => deleteItem(+btn.dataset.id))
  );
}

// ── CAPTURE ───────────────────────────────────────────────────────────────
const captureEl = document.getElementById('capture-input');

captureEl.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
  showAC();
});

captureEl.addEventListener('keydown', function(e){
  const acOpen = document.getElementById('ac-drop').classList.contains('open');
  if(acOpen){
    if(e.key==='Tab'||e.key==='ArrowRight'){e.preventDefault();doComplete();return}
    if(e.key==='ArrowDown'){e.preventDefault();moveAC(1);return}
    if(e.key==='ArrowUp'){e.preventDefault();moveAC(-1);return}
    if(e.key==='Escape'){e.preventDefault();closeAC();return}
  }
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const text = this.value.trim();
    if(!text) return;
    this.value = '';
    this.style.height = 'auto';
    closeAC();
    saveCapture(text);
  }
});

captureEl.addEventListener('blur', () => setTimeout(closeAC, 150));

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────
const AC_TAGS = [
  {tag:'action',desc:'Next physical action'},
  {tag:'project',desc:'Multi-step outcome'},
  {tag:'someday',desc:'Maybe later'},
  {tag:'reference',desc:'Keep for info'},
  {tag:'waiting',desc:'Blocked on someone'},
  {tag:'one',desc:'The one thing — unique!'},
  {tag:'next',desc:'Do next'},
  {tag:'now',desc:'Do immediately'},
  {tag:'backlog',desc:'Add to backlog'},
  {tag:'book',desc:'Route to books'},
  {tag:'high',desc:'High priority'},
  {tag:'medium',desc:'Medium priority'},
  {tag:'low',desc:'Low priority'},
];

let acList = [], acIdx = -1;

function getCtx(){
  const val = captureEl.value, cur = captureEl.selectionStart;
  let i = cur - 1;
  while(i >= 0 && val[i] !== ' ' && val[i] !== '\n') i--;
  const start = i + 1;
  const word = val.slice(start, cur);
  if(!word.startsWith('#')) return null;
  return { query: word.slice(1).toLowerCase(), start, end: cur };
}

function showAC(){
  const ctx = getCtx();
  const drop = document.getElementById('ac-drop');
  if(!ctx){ closeAC(); return; }
  acList = AC_TAGS.filter(t => t.tag.startsWith(ctx.query));
  if(!acList.length || (acList.length===1 && acList[0].tag===ctx.query)){ closeAC(); return; }
  acIdx = 0;
  renderAC();
  drop.classList.add('open');
}

function renderAC(){
  const drop = document.getElementById('ac-drop');
  drop.innerHTML = acList.map((t, i) => `
    <div class="ac-row${i===acIdx?' hi':''}" data-i="${i}">
      <span class="ac-tag">#${t.tag}</span>
      <span class="ac-desc">${t.desc}</span>
      ${i===acIdx?'<span class="ac-tab">Tab</span>':''}
    </div>`).join('');
  drop.querySelectorAll('.ac-row').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); acIdx = +el.dataset.i; doComplete(); });
    el.addEventListener('mouseover', () => { acIdx = +el.dataset.i; renderAC(); });
  });
}

function closeAC(){
  const drop = document.getElementById('ac-drop');
  drop.classList.remove('open');
  drop.innerHTML = '';
  acIdx = -1; acList = [];
}

function doComplete(){
  const ctx = getCtx();
  if(!ctx || acIdx < 0 || !acList[acIdx]) return;
  const tag = acList[acIdx].tag;
  captureEl.value = captureEl.value.slice(0, ctx.start) + '#' + tag + ' ' + captureEl.value.slice(ctx.end);
  const pos = ctx.start + tag.length + 2;
  captureEl.setSelectionRange(pos, pos);
  closeAC();
}

function moveAC(dir){
  if(!acList.length) return;
  acIdx = (acIdx + dir + acList.length) % acList.length;
  renderAC();
}

// ── BUTTON EVENTS ─────────────────────────────────────────────────────────
document.getElementById('auth-btn').addEventListener('click', signIn);
document.getElementById('auth-email').addEventListener('keydown', e => { if(e.key==='Enter') signIn(); });
document.getElementById('signout-btn').addEventListener('click', signOut);

// ── AUTH STATE ────────────────────────────────────────────────────────────
function onSignedIn(session){
  user = session.user;
  document.getElementById('user-email').textContent = user.email;
  show('app-screen');
  loadInbox();
  setTimeout(() => captureEl.focus(), 100);
}

function onSignedOut(){
  user = null;
  items = [];
  show('auth-screen');
  document.getElementById('auth-btn').disabled = false;
  document.getElementById('auth-btn').textContent = 'Send magic link →';
  document.getElementById('auth-notice').className = 'auth-notice';
}

// Listen for auth changes (handles magic link redirect)
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_IN' && session) onSignedIn(session);
  if(event === 'SIGNED_OUT') onSignedOut();
});

// Check for existing session on page load
sb.auth.getSession().then(({ data: { session } }) => {
  if(session) onSignedIn(session);
});
</script>
</body>
</html>
