<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LifeOS — Empty Your Mind</title>
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;
  --white:#ffffff;
  --ink:#1a1a1a;
  --ink2:#3d3d3d;
  --muted:#888;
  --muted2:#bbb;
  --border:#e8e5e0;
  --border2:#d4d0c8;
  --accent:#7c3aed;
  --accent-light:rgba(124,58,237,0.07);
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
}

html{scroll-behavior:smooth}
body{
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;font-size:14px;
}

/* ── AUTH SCREEN ── */
.auth-screen{
  display:none;
  min-height:100vh;
  align-items:center;justify-content:center;
  background:var(--ink);
  flex-direction:column;
  padding:2rem;
}
.auth-screen.show{display:flex}
.auth-brand{
  font-size:1.8rem;font-weight:800;
  letter-spacing:-0.03em;color:#fff;
  margin-bottom:0.35rem;
}
.auth-brand span{color:#a78bfa}
.auth-tagline{
  font-family:Georgia,serif;font-style:italic;
  font-size:0.85rem;color:rgba(255,255,255,0.3);
  margin-bottom:2.5rem;line-height:1.6;text-align:center;
}
.auth-card{
  background:var(--white);
  border-radius:var(--r-lg);
  padding:2rem;width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.auth-title{
  font-size:1rem;font-weight:700;
  margin-bottom:0.25rem;color:var(--ink);
}
.auth-sub{
  font-family:Georgia,serif;font-style:italic;
  font-size:0.8rem;color:var(--muted);
  margin-bottom:1.25rem;line-height:1.5;
}
.auth-input{
  width:100%;border:1.5px solid var(--border2);
  border-radius:var(--r-md);padding:0.65rem 0.9rem;
  font-family:'Segoe UI',sans-serif;font-size:0.9rem;
  color:var(--ink);background:var(--bg);outline:none;
  transition:border-color 0.15s;margin-bottom:0.75rem;
}
.auth-input:focus{border-color:var(--accent);background:var(--white)}
.auth-btn{
  width:100%;padding:0.65rem;
  background:var(--ink);color:#fff;border:none;
  border-radius:var(--r-md);font-family:'Segoe UI',sans-serif;
  font-size:0.88rem;font-weight:700;cursor:pointer;
  transition:background 0.15s;
}
.auth-btn:hover{background:#2d2d2d}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-msg{
  margin-top:0.85rem;padding:0.65rem 0.9rem;
  border-radius:var(--r-md);font-size:0.78rem;
  font-family:Georgia,serif;font-style:italic;
  text-align:center;display:none;
}
.auth-msg.success{background:#d1fae5;color:#065f46;display:block}
.auth-msg.error{background:#fee2e2;color:#991b1b;display:block}

/* ── LOADING ── */
.loading-screen{
  display:none;min-height:100vh;
  align-items:center;justify-content:center;
  background:var(--ink);flex-direction:column;gap:1rem;
}
.loading-screen.show{display:flex}
.loading-dot{
  width:8px;height:8px;border-radius:50%;
  background:#a78bfa;animation:pulse 1.2s ease infinite;
}
@keyframes pulse{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

/* ── APP ── */
.app-screen{display:none;min-height:100vh;flex-direction:column}
.app-screen.show{display:flex}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.75rem 1.25rem;
  background:var(--ink);color:#fff;
  flex-shrink:0;
}
.topbar-brand{
  font-size:0.95rem;font-weight:800;
  letter-spacing:-0.02em;flex:1;
}
.topbar-brand span{color:#a78bfa}
.topbar-user{
  font-size:0.68rem;color:rgba(255,255,255,0.35);
  font-family:Georgia,serif;font-style:italic;
  max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.topbar-signout{
  padding:0.28rem 0.7rem;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r-sm);
  font-family:'Segoe UI',sans-serif;
  font-size:0.65rem;color:rgba(255,255,255,0.4);
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.topbar-signout:hover{background:rgba(255,255,255,0.12);color:#fff}

/* ── CAPTURE AREA ── */
.capture-section{
  padding:1.25rem 1.25rem 0.75rem;
  background:var(--white);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.capture-wrap{position:relative}
.capture-input{
  width:100%;border:2px solid var(--border);
  border-radius:var(--r-lg);padding:0.85rem 1.1rem;
  font-family:'Segoe UI',sans-serif;font-size:1rem;
  color:var(--ink);background:var(--bg);
  outline:none;resize:none;min-height:52px;
  line-height:1.5;transition:border-color 0.15s,box-shadow 0.15s;
}
.capture-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(124,58,237,0.08);
}
.capture-input::placeholder{color:var(--muted2);font-style:italic}
.capture-hint{
  font-size:0.62rem;color:var(--muted2);
  margin-top:0.4rem;font-family:Georgia,serif;
  font-style:italic;text-align:right;
}

/* ── AUTOCOMPLETE ── */
.tag-autocomplete{
  position:absolute;top:calc(100% + 4px);left:0;
  background:var(--white);border:1.5px solid var(--border2);
  border-radius:var(--r-md);
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  z-index:100;min-width:200px;max-width:280px;
  overflow:hidden;display:none;
}
.tag-autocomplete.show{display:block}
.tac-item{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.48rem 0.75rem;cursor:pointer;
  transition:background 0.1s;border-bottom:1px solid var(--border);
}
.tac-item:last-child{border-bottom:none}
.tac-item:hover,.tac-item.selected{background:var(--accent-light)}
.tac-tag{
  font-family:'Cascadia Code','Consolas',monospace;
  font-size:0.7rem;font-weight:600;color:var(--ink2);
  border:1.5px solid var(--border2);border-radius:99px;
  padding:0.1rem 0.5rem;flex-shrink:0;
}
.tac-item.selected .tac-tag{border-color:var(--accent);color:var(--accent)}
.tac-desc{font-size:0.7rem;color:var(--muted);font-family:Georgia,serif;font-style:italic;flex:1}
.tac-hint{
  font-family:'Cascadia Code','Consolas',monospace;
  font-size:0.56rem;color:var(--muted2);
  background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:0.06rem 0.28rem;flex-shrink:0;
}
.tac-item.selected .tac-hint{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}

/* ── INBOX ── */
.inbox-section{flex:1;padding:1rem 1.25rem 2rem;overflow-y:auto}
.inbox-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:0.75rem;
}
.inbox-label{
  font-family:'Cascadia Code','Consolas',monospace;
  font-size:0.6rem;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--muted2);
}
.inbox-count{
  font-family:'Cascadia Code','Consolas',monospace;
  font-size:0.62rem;color:var(--muted2);
  background:var(--white);border:1px solid var(--border);
  border-radius:99px;padding:0.1rem 0.5rem;
}
.inbox-empty{
  text-align:center;padding:3rem 1rem;
  color:var(--muted2);font-family:Georgia,serif;
  font-style:italic;font-size:0.88rem;line-height:1.7;
}
.thought-item{
  display:flex;align-items:flex-start;gap:0.65rem;
  padding:0.55rem 0;border-bottom:1px solid var(--border);
  animation:slideIn 0.2s ease both;
}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.thought-item:last-child{border-bottom:none}
.thought-num{
  font-family:'Cascadia Code','Consolas',monospace;
  font-size:0.62rem;color:var(--muted2);
  min-width:1.4rem;text-align:right;
  padding-top:0.18rem;flex-shrink:0;
}
.thought-text{flex:1;font-size:0.88rem;line-height:1.5;color:var(--ink2)}
.thought-actions{
  display:flex;gap:0.25rem;opacity:0;
  transition:opacity 0.15s;flex-shrink:0;
}
.thought-item:hover .thought-actions{opacity:1}
.thought-action-btn{
  padding:0.18rem 0.5rem;border-radius:var(--r-sm);
  font-size:0.65rem;font-weight:600;
  font-family:'Segoe UI',sans-serif;
  cursor:pointer;transition:all 0.12s;
  border:1.5px solid transparent;background:none;
  white-space:nowrap;
}
.thought-action-btn.archive{color:#92400e;border-color:#fde68a;background:#fffbeb}
.thought-action-btn.archive:hover{background:#fef3c7;border-color:#d97706}
.thought-action-btn.delete{color:#6b7280;border-color:#e5e7eb;background:#f9fafb}
.thought-action-btn.delete:hover{background:#fee2e2;border-color:#ef4444;color:#991b1b}

/* inline tags */
.thought-tag{
  display:inline-flex;align-items:center;
  font-size:0.67rem;padding:0.12rem 0.48rem;
  border-radius:99px;margin-left:0.25rem;
  vertical-align:middle;font-weight:600;
}
.tag-action{color:#065f46;background:#d1fae5}
.tag-project{color:#4c1d95;background:#ede9fe}
.tag-someday{color:#92400e;background:#fef3c7}
.tag-reference{color:#1e3a8a;background:#dbeafe}
.tag-waiting{color:#831843;background:#fce7f3}
.tag-one{color:#fff;background:var(--ink);font-size:0.7rem}
.tag-next{color:#4c1d95;background:#ede9fe}
.tag-now{color:#fff;background:#ef4444}
.tag-high{color:#9a3412;background:#fed7aa}
.tag-medium{color:#92400e;background:#fef3c7}
.tag-low{color:#374151;background:#f3f4f6}
.tag-book{color:#065f46;background:#d1fae5}
.tag-backlog{color:#4c1d95;background:#ede9fe}
.tag-default{color:#374151;background:#f3f4f6}

/* #one elevated */
.thought-item.is-one{
  background:var(--white);border:1.5px solid var(--ink);
  border-radius:var(--r-md);padding:0.5rem 0.75rem;
  margin-bottom:0.4rem;
}
.thought-item.is-one .thought-text{font-weight:700;color:var(--ink)}

/* loading spinner */
.inbox-loading{
  text-align:center;padding:2rem;
  font-family:Georgia,serif;font-style:italic;
  font-size:0.82rem;color:var(--muted2);
}

/* status bar */
.status-bar{
  display:none;
  padding:0.4rem 1.25rem;
  font-size:0.65rem;font-family:Georgia,serif;font-style:italic;
  color:var(--muted);background:var(--bg);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.status-bar.show{display:block}
.status-bar.syncing{color:var(--amber)}
.status-bar.saved{color:var(--green)}
.status-bar.error{color:var(--red)}
</style>
</head>
<body>

<!-- ── LOADING SCREEN ── -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-dot"></div>
</div>

<!-- ── AUTH SCREEN ── -->
<div class="auth-screen show" id="auth-screen">
  <div class="auth-brand">Life<span>OS</span></div>
  <div class="auth-tagline">Your mind is for having ideas,<br>not holding them.</div>
  <div class="auth-card">
    <div class="auth-title">Sign in</div>
    <div class="auth-sub">Enter your email — we'll send you a magic link. No password needed.</div>
    <input
      type="email"
      class="auth-input"
      id="auth-email"
      placeholder="your@email.com"
      onkeydown="if(event.key==='Enter')signIn()"
    >
    <button class="auth-btn" id="auth-btn" onclick="signIn()">Send magic link →</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div class="app-screen" id="app-screen">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">Life<span>OS</span></div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="topbar-signout" onclick="signOut()">Sign out</button>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar"></div>

  <!-- Capture -->
  <div class="capture-section">
    <div class="capture-wrap">
      <textarea
        class="capture-input"
        id="capture-input"
        rows="1"
        placeholder="What's on your mind… (type # for tags)"
        oninput="autoResize(this);showTagAutocomplete()"
        onkeydown="handleCapture(event)"
      ></textarea>
      <div class="tag-autocomplete" id="tag-autocomplete"></div>
    </div>
    <div class="capture-hint">Enter to capture · Tab to complete tag</div>
  </div>

  <!-- Inbox -->
  <div class="inbox-section">
    <div class="inbox-header">
      <span class="inbox-label">Inbox</span>
      <span class="inbox-count" id="inbox-count">0 items</span>
    </div>
    <div id="inbox-list">
      <div class="inbox-loading">Loading your inbox…</div>
    </div>
  </div>

</div>

<script>
// ── SUPABASE INIT ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://gjtosnepnxtdwehvdpie.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqdG9zbmVwbnh0ZHdlaHZkcGllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjMyMDcsImV4cCI6MjA5MTA5OTIwN30.7djS-wM0MiEJbUpEE0AE9FPpj8rf72Mo_JMgo0zoTq0';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ─────────────────────────────────────────────────────────────────
let currentUser = null;
let thoughts = [];

// ── SCREENS ───────────────────────────────────────────────────────────────
function showScreen(name){
  document.getElementById('loading-screen').classList.remove('show');
  document.getElementById('auth-screen').classList.remove('show');
  document.getElementById('app-screen').classList.remove('show');
  document.getElementById(name+'-screen').classList.add('show');
}

// ── AUTH ──────────────────────────────────────────────────────────────────
async function signIn(){
  const email = document.getElementById('auth-email').value.trim();
  if(!email){ showAuthMsg('Please enter your email.', 'error'); return; }
  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });
  if(error){
    showAuthMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Send magic link →';
  } else {
    showAuthMsg('✓ Check your email — magic link sent!', 'success');
    btn.textContent = 'Sent!';
  }
}

function showAuthMsg(msg, type){
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function signOut(){
  await supabase.auth.signOut();
  currentUser = null;
  thoughts = [];
  showScreen('auth');
}

// ── INBOX ─────────────────────────────────────────────────────────────────
async function loadInbox(){
  if(!currentUser) return;
  try{
    const { data, error } = await supabase
      .from('inbox')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });
    if(error) throw error;
    thoughts = data || [];
    renderInbox();
  } catch(e){
    console.error('Load failed', e);
    showStatus('Failed to load inbox', 'error');
  }
}

async function captureThought(text){
  if(!currentUser) return;
  showStatus('Saving…', 'syncing');
  try{
    const { data, error } = await supabase
      .from('inbox')
      .insert({
        user_id: currentUser.id,
        text: text,
        tags: extractTags(text).join(',')
      })
      .select()
      .single();
    if(error) throw error;
    thoughts.unshift(data);
    renderInbox();
    showStatus('✓ Saved', 'saved');
    setTimeout(()=>hideStatus(), 2000);
  } catch(e){
    console.error('Capture failed', e);
    showStatus('Failed to save', 'error');
  }
}

async function archiveThought(id){
  thoughts = thoughts.filter(t => t.id !== id);
  renderInbox();
  await supabase.from('inbox').update({tags: 'archived'}).eq('id', id);
}

async function deleteThought(id){
  thoughts = thoughts.filter(t => t.id !== id);
  renderInbox();
  await supabase.from('inbox').delete().eq('id', id);
}

// ── STATUS BAR ────────────────────────────────────────────────────────────
function showStatus(msg, type){
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'status-bar show ' + type;
}
function hideStatus(){
  document.getElementById('status-bar').classList.remove('show');
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderInbox(){
  const list = document.getElementById('inbox-list');
  const count = document.getElementById('inbox-count');
  count.textContent = thoughts.length + ' item' + (thoughts.length !== 1 ? 's' : '');
  if(!thoughts.length){
    list.innerHTML = '<div class="inbox-empty">Nothing captured yet.<br>Type something above and press Enter.</div>';
    return;
  }
  list.innerHTML = thoughts.map((t, i) => {
    const isOne = extractTags(t.text).includes('one');
    return `<div class="thought-item ${isOne ? 'is-one' : ''}">
      <span class="thought-num">${i + 1}</span>
      <span class="thought-text">${renderThoughtText(t.text)}</span>
      <div class="thought-actions">
        <button class="thought-action-btn archive" onclick="archiveThought(${t.id})">archive</button>
        <button class="thought-action-btn delete" onclick="deleteThought(${t.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

const TAG_CLASSES={
  action:'tag-action',project:'tag-project',someday:'tag-someday',
  reference:'tag-reference',waiting:'tag-waiting',one:'tag-one',
  next:'tag-next',now:'tag-now',high:'tag-high',medium:'tag-medium',
  low:'tag-low',book:'tag-book',backlog:'tag-backlog',
};

function renderThoughtText(text){
  return escHtml(text).replace(/#(\w+)/g,(match,tag)=>{
    const cls = TAG_CLASSES[tag.toLowerCase()] || 'tag-default';
    return `<span class="thought-tag ${cls}">${match}</span>`;
  });
}

function extractTags(text){
  const m = text.match(/#\w+/g);
  return m ? m.map(t => t.slice(1).toLowerCase()) : [];
}

// ── CAPTURE ───────────────────────────────────────────────────────────────
function handleCapture(e){
  const acOpen = document.getElementById('tag-autocomplete')?.classList.contains('show');
  if(acOpen){
    if(e.key==='Tab'||e.key==='ArrowRight'){e.preventDefault();completeTag();return}
    if(e.key==='ArrowDown'){e.preventDefault();moveAcSelection(1);return}
    if(e.key==='ArrowUp'){e.preventDefault();moveAcSelection(-1);return}
    if(e.key==='Escape'){e.preventDefault();hideTagAutocomplete();return}
  }
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const input = document.getElementById('capture-input');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    input.style.height = 'auto';
    hideTagAutocomplete();
    captureThought(text);
  }
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

// ── HASHTAG AUTOCOMPLETE ──────────────────────────────────────────────────
const AC_TAGS=[
  {tag:'action',desc:'Next physical action'},
  {tag:'project',desc:'Multi-step outcome'},
  {tag:'someday',desc:'Maybe later'},
  {tag:'reference',desc:'Keep for info'},
  {tag:'waiting',desc:'Blocked on someone'},
  {tag:'one',desc:'The one thing — unique!'},
  {tag:'next',desc:'Do next'},
  {tag:'now',desc:'Do immediately'},
  {tag:'backlog',desc:'Add to backlog'},
  {tag:'book',desc:'Route to books'},
  {tag:'high',desc:'High priority'},
  {tag:'medium',desc:'Medium priority'},
  {tag:'low',desc:'Low priority'},
];

let acFiltered=[], acSelectedIdx=-1;

function getHashContext(){
  const el=document.getElementById('capture-input');
  if(!el)return null;
  const val=el.value, cursor=el.selectionStart;
  let i=cursor-1;
  while(i>=0&&val[i]!==' '&&val[i]!=='\n')i--;
  const wordStart=i+1;
  const word=val.slice(wordStart,cursor);
  if(!word.startsWith('#'))return null;
  return{query:word.slice(1).toLowerCase(),wordStart,wordEnd:cursor};
}

function showTagAutocomplete(){
  const ctx=getHashContext();
  const ac=document.getElementById('tag-autocomplete');
  if(!ctx){hideTagAutocomplete();return}
  acFiltered=AC_TAGS.filter(t=>t.tag.startsWith(ctx.query));
  if(!acFiltered.length||(acFiltered.length===1&&acFiltered[0].tag===ctx.query)){hideTagAutocomplete();return}
  acSelectedIdx=0;
  renderTagAutocomplete();
  ac.classList.add('show');
}

function renderTagAutocomplete(){
  const ac=document.getElementById('tag-autocomplete');
  ac.innerHTML=acFiltered.map((t,i)=>`
    <div class="tac-item ${i===acSelectedIdx?'selected':''}" data-idx="${i}">
      <span class="tac-tag">#${t.tag}</span>
      <span class="tac-desc">${t.desc}</span>
      ${i===acSelectedIdx?'<span class="tac-hint">Tab</span>':''}
    </div>`).join('');
  ac.querySelectorAll('.tac-item').forEach(el=>{
    el.addEventListener('mousedown',e=>{e.preventDefault();acSelectedIdx=parseInt(el.dataset.idx);completeTag()});
    el.addEventListener('mouseover',()=>{acSelectedIdx=parseInt(el.dataset.idx);renderTagAutocomplete()});
  });
}

function hideTagAutocomplete(){
  const ac=document.getElementById('tag-autocomplete');
  if(ac){ac.classList.remove('show');ac.innerHTML=''}
  acSelectedIdx=-1;acFiltered=[];
}

function completeTag(){
  const ctx=getHashContext();
  if(!ctx||acSelectedIdx<0||!acFiltered[acSelectedIdx])return;
  const el=document.getElementById('capture-input');
  const tag=acFiltered[acSelectedIdx].tag;
  const val=el.value;
  el.value=val.slice(0,ctx.wordStart)+'#'+tag+' '+val.slice(ctx.wordEnd);
  const newPos=ctx.wordStart+tag.length+2;
  el.setSelectionRange(newPos,newPos);
  hideTagAutocomplete();
}

function moveAcSelection(dir){
  if(!acFiltered.length)return;
  acSelectedIdx=(acSelectedIdx+dir+acFiltered.length)%acFiltered.length;
  renderTagAutocomplete();
}

// ── INIT ─────────────────────────────────────────────────────────────────
// Auth screen shows by default (set in HTML)
// Only switch to app if already logged in

supabase.auth.onAuthStateChange(async (event, session) => {
  if(session?.user){
    currentUser = session.user;
    document.getElementById('topbar-user').textContent = currentUser.email;
    showScreen('app');
    await loadInbox();
    setTimeout(()=>document.getElementById('capture-input').focus(), 100);
  } else {
    showScreen('auth');
  }
});

// Blur handler for autocomplete
document.addEventListener('click', e => {
  if(!e.target.closest('.capture-wrap')) hideTagAutocomplete();
});
</script>
